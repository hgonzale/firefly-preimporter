# Copy to ~/.local/etc/firefly_import.toml  then:  chmod 600 ~/.local/etc/firefly_import.toml

[common]
personal_access_token = "..."
request_timeout = 30
# ca_cert_path = "/etc/ssl/certs/my-ca.pem"
default_upload = "firefly"   # "firefly" | "fidi" | omit to be asked

# [common.azure-ai]   # optional — omit if not using AI account matching
# endpoint = "https://my-hub.openai.azure.com/"
# api_key = "..."
# model = "gpt-4o-mini"
# history_days = 60
# max_history_per_account = 100

[fidi]
import_secret = "..."
autoupload_url = "https://fidi.example.com/autoupload"

[fidi.json-config]
date = "Y-m-d"
delimiter = "comma"
headers = true
rules = true
skip_form = true
add_import_tag = true
duplicate_detection_method = "cell"
unique_column_type = "external-id"
unique_column_index = 0
flow = "file"   # "file" | "csv" | "json"

[firefly-api]
api_base = "https://firefly.example.com/api/v1"
allow_duplicates = false
